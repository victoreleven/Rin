name = "rin"
main = "server/src/_worker.ts"
compatibility_date = "2026-03-11"

[assets]
directory = "dist/client"
binding = "ASSETS"

# D1 Database binding (需要创建 D1 数据库)
[[d1_databases]]
binding = "DB"
database_name = "rin-db"
database_id = "745b92f3-aba5-46e3-aaa9-aa2c4322a1dd"

# Environment variables
[vars]
JWT_SECRET = "change-this-to-a-random-secret-key"
CACHE_STORAGE_MODE = "database"
